name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcpretty
        run: sudo gem install xcpretty --no-document --quiet 2>&1 || true

      - name: Initialize submodules
        run: git submodule update --init Dependencies/MMTabBarView

      - name: Fix and build MMTabBarView.framework
        run: |
          # Fix Darwin.Availability module import for modern SDKs
          sed -i '' 's/@import Darwin.Availability;/#import <Availability.h>/' \
            "Dependencies/MMTabBarView/MMTabBarView/MMTabBarView/Styles/Mojave Tab Style/MMMojaveTabStyle+Assets.m"
          # Set deployment target to 10.13 in the project file (needed for libarclite removal)
          plutil -convert json -o /tmp/mmtab.json \
            "Dependencies/MMTabBarView/MMTabBarView/MMTabBarView.xcodeproj/project.pbxproj"
          python3 -c 'import json; d=json.load(open("/tmp/mmtab.json")); [o.get("buildSettings",{}).__setitem__("MACOSX_DEPLOYMENT_TARGET","10.13") for o in d.get("objects",{}).values() if isinstance(o,dict)]; json.dump(d,open("/tmp/mmtab.json","w"))'
          plutil -convert binary1 -o \
            "Dependencies/MMTabBarView/MMTabBarView/MMTabBarView.xcodeproj/project.pbxproj" \
            /tmp/mmtab.json
          xcodebuild -project Dependencies/MMTabBarView/MMTabBarView/MMTabBarView.xcodeproj \
                     -scheme MMTabBarView \
                     -configuration Release \
                     -sdk macosx \
                     CODE_SIGNING_ALLOWED=NO \
                     build 2>&1 | xcpretty

      - name: Copy MMTabBarView.framework
        run: |
          cp -R "$(find ~/Library/Developer/Xcode/DerivedData/MMTabBarView-*/Build/Products/Release -name 'MMTabBarView.framework' -type d | head -1)" \
            Frameworks/MMTabBarView.framework

      - name: Install build tools
        run: brew install meson ninja pkg-config intltool || true

      - name: Build universal dependencies (vendored, no network)
        run: bash Dependencies/build-universal-deps.sh 2>&1 | tail -40

      - name: Assert universal architectures
        run: |
          set -e
          for fw in libintl libffi libpcre2-8 glib libgmodule libgobject \
                    libgthread libgio libxml2 libgpg-error libgcrypt libotr libpurple; do
            bin="Frameworks/$fw.framework/Versions/A/$fw"
            archs="$(lipo -archs "$bin")"
            echo "$fw: $archs"
            [ "$archs" = "x86_64 arm64" ] || [ "$archs" = "arm64 x86_64" ] || { echo "FAIL: $fw"; exit 1; }
          done
          nm -gU Frameworks/libpurple.framework/Versions/A/libpurple | grep -q ' _purple_core_init'

      - name: Build AIUtilities.framework
        run: |
          set -o pipefail
          xcodebuild -project Frameworks/AIUtilities/AIUtilities.xcodeproj \
                     -target AIUtilities.framework \
                     -configuration Debug \
                     -sdk macosx \
                     CODE_SIGNING_ALLOWED=NO \
                     build 2>&1 | xcpretty

      # AdiumLibpurple, Purple Service, and Adium targets compile
      # against the vendored frameworks. Upstream libpurple 2.14.14
      # is configured with --with-static-prpls=jabber,irc,simple and
      # --disable-plugins. The universal deps pipeline, MMTabBarView,
      # and AIUtilities are built first so they are available.