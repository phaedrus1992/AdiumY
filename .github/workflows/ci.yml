name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcpretty
        run: sudo gem install xcpretty --no-document --quiet 2>&1 || true

      - name: Build AIUtilities.framework
        run: |
          set -o pipefail
          xcodebuild -project Frameworks/AIUtilities/AIUtilities.xcodeproj \
                     -target AIUtilities.framework \
                     -configuration Debug \
                     -sdk macosx \
                     CODE_SIGNING_ALLOWED=NO \
                     build 2>&1 | xcpretty

      # AdiumLibpurple and Adium targets depend on MMTabBarView.framework
      # which isn't checked in yet — they'll be added once that dependency
      # is resolved.